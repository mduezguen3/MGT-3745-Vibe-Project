<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burn Rate Blitz — Startup Jetpack Runner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #04070f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    user-select: none;
  }
  #wrapper {
    position: relative;
    width: 1000px;
    height: 600px;
    box-shadow: 0 0 60px rgba(80,220,255,0.15), 0 0 120px rgba(80,220,255,0.06);
  }
  canvas {
    display: block;
    width: 1000px;
    height: 600px;
    cursor: none;
  }
  @media (max-width: 1020px) {
    #wrapper { width: 100vw; height: 60vw; }
    canvas { width: 100vw; height: 60vw; }
  }
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="1000" height="600"></canvas>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// BURN RATE BLITZ — Browser Port
// Theme: Startup founder jetpack runner
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = 1000, H = 600, RAIL = 58, FPS = 60;

// ── Palette ────────────────────────────────────────────────
const P = {
  bg:      '#090e16', dark:    '#0d1525', panel:   '#111827',
  rail:    '#1e2d40', railEdge:'#3c485f',
  yellow:  '#ffe15a', cyan:    '#50dcf9', green:   '#50ffa0',
  red:     '#ff4b4b', purple:  '#c87aff', orange:  '#ff9640',
  white:   '#ffffff', muted:   '#8da4bf', mid:     '#c5d5e8',
};

// ── Font setup ─────────────────────────────────────────────
let FONT_LOADED = false;
document.fonts.ready.then(() => { FONT_LOADED = true; });
const F = (sz, bold=false) => `${bold?'bold ':''} ${sz}px 'Share Tech Mono', monospace`;
const FO = (sz) => `900 ${sz}px 'Orbitron', monospace`;

// ── Helpers ────────────────────────────────────────────────
const clamp = (v,lo,hi) => v<lo?lo:v>hi?hi:v;
const lerp  = (a,b,t)   => a+(b-a)*t;
const rand  = (lo,hi)   => lo + Math.random()*(hi-lo);
const randI = (lo,hi)   => Math.floor(rand(lo,hi+1));
const TAU   = Math.PI*2;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function glowCircle(x, y, r, color, alpha=0.35) {
  const [cr,cg,cb] = hexToRgb(color);
  const g = ctx.createRadialGradient(x,y,0,x,y,r*3);
  g.addColorStop(0,   `rgba(${cr},${cg},${cb},${alpha})`);
  g.addColorStop(0.4, `rgba(${cr},${cg},${cb},${alpha*0.5})`);
  g.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
  ctx.save();
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x,y,r*3,0,TAU);
  ctx.fill();
  ctx.restore();
}

function glowLine(x1,y1,x2,y2, color, width=5) {
  const [cr,cg,cb] = hexToRgb(color);
  ctx.save();
  for(const [w,a] of [[width+10,0.08],[width+5,0.15],[width+2,0.25]]) {
    ctx.strokeStyle = `rgba(${cr},${cg},${cb},${a})`;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  }
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
}

// ── Particle ───────────────────────────────────────────────
class Particle {
  constructor(x,y,vx,vy,life,color,r) {
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.life=life; this.maxLife=life; this.color=color; this.r=r;
  }
  update(dt, wdx=0) {
    this.x += (this.vx - wdx*0.18)*dt*60;
    this.y += this.vy*dt*60;
    this.vy += 0.04*dt*60;
    this.life -= dt;
  }
  draw() {
    if(this.life<=0) return;
    const a = clamp(this.life/this.maxLife,0,1);
    const [cr,cg,cb] = hexToRgb(this.color);
    ctx.save();
    ctx.globalAlpha = a*0.9;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, TAU);
    ctx.fill();
    ctx.restore();
  }
}

// ── Background (Jacob Sherburne) ───────────────────────────
class LabBackground {
  constructor() {
    this.gridOffset = 0;
  }
  update(speed) { this.gridOffset = (this.gridOffset + speed) % (W/4); }

  draw(distance, ticks) {
    // ── Vertical gradient base ──────────────────────────────
    const grad = ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,   '#06090e');
    grad.addColorStop(1,   '#0a1218');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W,H);

    // Blue tint pulse overlay
    const tint = (Math.sin(distance/600)+1)*12;
    ctx.save();
    ctx.globalAlpha = (70+tint)/255;
    ctx.fillStyle = `rgb(${25+Math.floor(tint)},${48+Math.floor(tint)},${78+Math.floor(tint)})`;
    ctx.fillRect(0,0,W,H);
    ctx.restore();

    // ── CEILING (office) ────────────────────────────────────
    const CEIL_H = RAIL;
    ctx.fillStyle = '#32373f';
    ctx.fillRect(0, 0, W, CEIL_H);

    // Ceiling light strips
    const stripW=220, stripH=10, gap=480, pitch=stripW+gap;
    const ceilScroll = (distance*1.5) % pitch;
    const strip1Y = CEIL_H - 18;
    const strip2Y = CEIL_H - 34;

    const drawLightStrip = (x, y) => {
      // housing
      ctx.fillStyle='#16181e'; roundRect(x,y,stripW,stripH,6); ctx.fill();
      // diffuser
      ctx.fillStyle='#ebf2ff'; roundRect(x+6,y+2,stripW-12,stripH-4,6); ctx.fill();
      // glow halo
      const lg = ctx.createRadialGradient(x+stripW/2,y+stripH/2,0, x+stripW/2,y+stripH/2,stripW*0.6);
      lg.addColorStop(0,'rgba(180,205,255,0.18)');
      lg.addColorStop(1,'rgba(180,205,255,0)');
      ctx.save(); ctx.fillStyle=lg;
      ctx.fillRect(x-30,y-20,stripW+60,stripH+40);
      ctx.restore();
    };

    let lx = -pitch - ceilScroll;
    while(lx < W+pitch) {
      drawLightStrip(lx, strip1Y);
      drawLightStrip(lx + pitch/2, strip2Y);
      lx += pitch;
    }
    // Ceiling shadow line
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.fillStyle='#000'; ctx.fillRect(0, CEIL_H-6, W, 6);
    ctx.restore();

    // ── FLOOR (carpet tiles) ────────────────────────────────
    const FLOOR_H = RAIL;
    const floorY = H - FLOOR_H;
    ctx.fillStyle='#20222a'; ctx.fillRect(0, floorY, W, FLOOR_H);

    const tile=28, floorScroll = distance % tile;
    ctx.strokeStyle='#12141a'; ctx.lineWidth=1;
    for(let tx=-tile; tx<W+tile; tx+=tile) {
      const fx = tx - floorScroll;
      ctx.beginPath(); ctx.moveTo(fx,floorY); ctx.lineTo(fx,H); ctx.stroke();
    }
    for(let ty=0; ty<FLOOR_H+tile; ty+=tile) {
      const fy=floorY+ty;
      ctx.strokeStyle='#161820';
      ctx.beginPath(); ctx.moveTo(0,fy); ctx.lineTo(W,fy); ctx.stroke();
    }
    // carpet texture blocks
    for(let tx=-tile; tx<W+tile; tx+=tile) {
      const fx = tx - floorScroll;
      const idx = Math.floor((tx/tile+1000))%10;
      const shade = 30+(idx*7)%10;
      ctx.fillStyle=`rgb(${shade},${shade+1},${shade+3})`;
      roundRect(fx+6, floorY+10, tile-12, 10, 2); ctx.fill();
    }
    ctx.strokeStyle='#464e58'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,floorY); ctx.lineTo(W,floorY); ctx.stroke();

    // ── MIDGROUND CITY SKYLINE ──────────────────────────────
    const SKY_FILL='#060a10', SKY_RIM='#2d3c55', WIN_COL='#d2e1ff';
    const groundY = H - RAIL;
    const scale = 0.68;
    const baseTiles = [
      [120,260,260,2],[90,210,320,1],[140,290,280,3],[110,240,300,0],
      [150,320,260,4],[100,230,340,5],[160,340,300,2],[80,190,360,1],
      [130,275,310,3],[105,235,330,0],
    ];
    const tiles = baseTiles.map(([w,h,g,r])=>[Math.floor(w*scale),Math.floor(h*scale),Math.floor(g*scale),r]);
    let span=0; for(const [bw,,bg] of tiles) span+=bw+bg;
    const skyScroll = (distance*1.05) % span;
    let bx = -skyScroll;
    while(bx < W+span) {
      for(const [bw,bh,bg,roofType] of tiles) {
        const rx=Math.floor(bx), ry=groundY-bh;
        // building body
        ctx.fillStyle=SKY_FILL; ctx.fillRect(rx,ry,bw,bh);
        ctx.strokeStyle=SKY_RIM; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx+bw,ry); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx,groundY); ctx.stroke();
        // roof types
        const cx2=rx+bw/2;
        if(roofType===1){ ctx.strokeStyle=SKY_RIM; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx2,ry); ctx.lineTo(cx2,ry-Math.floor(18*scale)); ctx.stroke(); }
        else if(roofType===2){ const tw=Math.max(10,bw/6),th=Math.floor(22*scale); ctx.fillStyle=SKY_FILL; ctx.fillRect(cx2-tw/2,ry-th,tw,th); ctx.strokeStyle=SKY_RIM; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx2-tw/2,ry-th); ctx.lineTo(cx2+tw/2,ry-th); ctx.stroke(); }
        else if(roofType===3){ const sw=bw/3,sy2=ry+bh/5; ctx.fillStyle=SKY_FILL; ctx.fillRect(rx,sy2,sw,groundY-sy2); ctx.strokeStyle=SKY_RIM; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(rx,sy2); ctx.lineTo(rx+sw,sy2); ctx.stroke(); }
        else if(roofType===4){ const top=ry-Math.floor(22*scale); ctx.fillStyle=SKY_FILL; ctx.beginPath(); ctx.moveTo(cx2,top); ctx.lineTo(cx2-8,ry); ctx.lineTo(cx2+8,ry); ctx.closePath(); ctx.fill(); ctx.strokeStyle=SKY_RIM; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx2-8,ry); ctx.lineTo(cx2,top); ctx.lineTo(cx2+8,ry); ctx.stroke(); }
        else if(roofType===5){ const ch=Math.floor(10*scale); ctx.fillStyle=SKY_FILL; ctx.fillRect(rx,ry-ch,bw,ch); ctx.strokeStyle=SKY_RIM; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(rx,ry-ch); ctx.lineTo(rx+bw,ry-ch); ctx.stroke(); }
        // windows
        const cols=bw>=90?3:2, rows=bh>=Math.floor(180*scale)?5:4;
        const ww=Math.max(3,Math.floor(5*scale)), wh=Math.max(5,Math.floor(9*scale));
        const padX=Math.max(8,Math.floor(12*scale)), padTop=Math.max(10,Math.floor(18*scale)), padBot=Math.max(10,Math.floor(16*scale));
        const colSpacing=Math.max(12,(bw-2*padX)/Math.max(1,cols));
        const rowSpacing=Math.max(16,(bh-padTop-padBot)/Math.max(1,rows));
        for(let wr=0;wr<rows;wr++) for(let wc=0;wc<cols;wc++) {
          const mask=(wr*7+wc*11+bw+bh)%12;
          if(mask<3){ const wx=rx+padX+wc*colSpacing, wy=ry+padTop+wr*rowSpacing;
            if(wx+ww<rx+bw-2&&wy+wh<groundY-2){ ctx.fillStyle=WIN_COL; roundRect(wx,wy,ww,wh,2); ctx.fill(); } }
        }
        bx += bw+bg;
      }
    }

    // ── INTERIOR WALL with big windows ──────────────────────
    const WALL_Y = CEIL_H, WALL_H = H - CEIL_H - FLOOR_H;
    // opaque wall layer
    ctx.fillStyle='rgba(14,18,28,1)';
    ctx.fillRect(0, WALL_Y, W, WALL_H);

    // window cutouts
    const winW=380, winH=260, winFrame=14, winGap=600;
    const winPitch=winW+winGap;
    const winScroll=(distance*1.5) % winPitch;
    const winStartX = -winScroll - winPitch;

    const drawWindow = (wx, wy) => {
      // clamp to interior surface
      const top=Math.max(wy, WALL_Y), bot=Math.min(wy+winH, WALL_Y+WALL_H);
      if(bot<=top) return;
      // frame
      ctx.fillStyle='#37465f';
      roundRect(wx, wy, winW, winH, 18); ctx.fill();
      // glass cutout — draw sky gradient in the hole
      const inner = {x:wx+winFrame, y:wy+winFrame, w:winW-winFrame*2, h:winH-winFrame*2};
      const skyG = ctx.createLinearGradient(0, inner.y, 0, inner.y+inner.h);
      skyG.addColorStop(0,'#0a1828'); skyG.addColorStop(1,'#162840');
      ctx.fillStyle=skyG; roundRect(inner.x,inner.y,inner.w,inner.h,14); ctx.fill();
      // glass tint
      ctx.save(); ctx.globalAlpha=0.10; ctx.fillStyle='#78b4ff';
      roundRect(inner.x,inner.y,inner.w,inner.h,14); ctx.fill(); ctx.restore();
      // mullions
      const midX=wx+winW/2, midY=wy+winH/2;
      ctx.fillStyle='#37465f';
      ctx.fillRect(midX-4, inner.y, 8, inner.h);
      ctx.fillRect(inner.x, midY-4, inner.w, 8);
    };

    const row1Y = WALL_Y + 30;
    const row2Y = WALL_Y + WALL_H - winH - 30;
    let wx = winStartX;
    while(wx < W+winPitch) {
      drawWindow(wx, row1Y);
      drawWindow(wx + winPitch/2, row2Y);
      wx += winPitch;
    }

    // ── Floating lab dots (parallax) ────────────────────────
    for(let i=0;i<55;i++) {
      const dx2 = ((i*73 - distance*0.6) % (W+120) + W+120) % (W+120) - 60;
      const dy2 = 80 + (i*41) % (H-160);
      if(i%3===0) glowCircle(dx2, dy2, 2, '#dce8ff', 0.16);
      ctx.fillStyle='#dce8ff'; ctx.beginPath(); ctx.arc(dx2,dy2,2,0,TAU); ctx.fill();
    }

    // ── Vignette ────────────────────────────────────────────
    ctx.save(); ctx.globalAlpha=0.30;
    ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

// ── Player ─────────────────────────────────────────────────
class Player {
  constructor() {
    this.W=36; this.H=52; this.x=140;
    this.y=H*0.55; this.vy=0;
    this.boosting=false;
    this.gravity=0.48; this.thrust=1.08;
    this.maxUp=-11; this.maxDown=12;
    this.lives=3; this.invuln=0; this.lastSafeY=this.y;
    this.shieldT=0; this.doubleT=0; this.magnetT=0; this.gunT=0; this.shootCd=0;
  }
  reset(hasStarter) {
    this.y=H*0.55; this.vy=0; this.boosting=false;
    this.lives=3; this.invuln=0; this.lastSafeY=this.y;
    this.shieldT=this.doubleT=this.magnetT=this.gunT=this.shootCd=0;
  }
  get rect() {
    const sx=9,sy=10;
    return {x:this.x+sx/2, y:this.y+sy/2, w:this.W-sx, h:this.H-sy};
  }
  update(dt) {
    this.shieldT = Math.max(0,this.shieldT-dt);
    this.doubleT = Math.max(0,this.doubleT-dt);
    this.magnetT = Math.max(0,this.magnetT-dt);
    this.gunT    = Math.max(0,this.gunT-dt);
    this.invuln  = Math.max(0,this.invuln-dt);
    this.shootCd = Math.max(0,this.shootCd-dt);

    if(this.boosting) {
      const m = this.doubleT>0 ? 1.55 : 1.0;
      this.vy -= this.thrust*m;
    }
    this.vy = clamp(this.vy + this.gravity, this.maxUp, this.maxDown);
    this.y  = clamp(this.y + this.vy, RAIL, H-RAIL-this.H);
    if(this.y<=RAIL && this.vy<0)           this.vy=0;
    if(this.y>=H-RAIL-this.H && this.vy>0) this.vy=0;
    if(this.y>=RAIL && this.y<=H-RAIL-this.H) this.lastSafeY=this.y;
  }
  respawn() {
    this.y = clamp(this.lastSafeY, RAIL, H-RAIL-this.H);
    this.vy=0; this.invuln=1.4;
  }
  canShoot() { return this.gunT>0 && this.shootCd<=0; }
  shoot()    { this.shootCd=0.16; }

  draw(ticks, hasCoolTrail) {
    const r = this.rect;
    const cx=r.x+r.w/2, cy=r.y+r.h/2;

    // Cool trail
    if(hasCoolTrail && this.boosting) {
      for(let i=0;i<7;i++) {
        glowCircle(r.x-18-i*9, cy+Math.sin((ticks+i*4)/5)*5, 4, P.cyan, 0.22);
      }
    }

    // Jetpack body
    ctx.save();
    ctx.fillStyle='#c8cdd7'; ctx.strokeStyle='#8892a0'; ctx.lineWidth=1;
    roundRect(r.x-19, r.y+12, 19, 28, 5);
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // Flame / idle legs
    if(this.boosting) {
      glowCircle(r.x-28, cy+14, 8, P.red, 0.5);
      ctx.save();
      ctx.fillStyle=P.red;
      ctx.beginPath(); ctx.ellipse(r.x-27, r.y+46, 10, 15, 0, 0, TAU); ctx.fill();
      ctx.fillStyle='#ff8c00';
      ctx.beginPath(); ctx.ellipse(r.x-25, r.y+48, 7, 13, 0, 0, TAU); ctx.fill();
      ctx.fillStyle='#fff078';
      ctx.beginPath(); ctx.ellipse(r.x-24, r.y+50, 3, 10, 0, 0, TAU); ctx.fill();
      ctx.restore();
    } else {
      const phase = Math.floor(ticks/10)%4;
      const c1 = phase%2===0 ? P.yellow : '#ff8c00';
      const c2 = phase%2===0 ? '#ff8c00' : P.yellow;
      ctx.save();
      ctx.fillStyle=c1; roundRect(r.x+5,  r.y+r.h-5, 9, 16, 4); ctx.fill();
      ctx.fillStyle=c2; roundRect(r.x+16, r.y+r.h-5, 9, 16, 4); ctx.fill();
      ctx.restore();
    }

    // Body
    ctx.save();
    ctx.fillStyle=P.orange;
    ctx.beginPath(); ctx.ellipse(r.x+r.w/2+2, r.y+r.h/2+4, r.w/2-2, r.h/2-4, 0, 0, TAU); ctx.fill();
    // Head
    ctx.beginPath(); ctx.arc(r.x+r.w-11, r.y+9, 12, 0, TAU); ctx.fill();
    ctx.restore();
    // Eye
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(r.x+r.w-7, r.y+7, 3, 0, TAU); ctx.fill();

    // Gun
    if(this.gunT>0) {
      ctx.fillStyle='#c8cdd8';
      roundRect(r.x+r.w-7, r.y+24, 20, 6, 3); ctx.fill();
      ctx.fillStyle='#828aa0';
      roundRect(r.x+r.w+10, r.y+25, 10, 4, 2); ctx.fill();
    }

    // Shield aura
    if(this.shieldT>0) {
      ctx.save();
      ctx.strokeStyle='rgba(80,200,255,0.55)';
      ctx.lineWidth=3; ctx.shadowColor=P.cyan; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.ellipse(cx, cy, r.w/2+14, r.h/2+14, 0, 0, TAU); ctx.stroke();
      ctx.restore();
    }

    // Invuln blink
    if(this.invuln>0 && Math.floor(this.invuln*10)%2===0) {
      ctx.save(); ctx.globalAlpha=0.35; ctx.fillStyle=P.white;
      ctx.beginPath(); ctx.ellipse(cx, cy, r.w/2+10, r.h/2+10, 0, 0, TAU); ctx.fill();
      ctx.restore();
    }
  }
}

// ── Laser ──────────────────────────────────────────────────
class Laser {
  constructor(x, y, vertical) {
    this.vertical=vertical;
    this.len=randI(100,200); this.thick=6;
    this.x1=x; this.y1=y;
    this.x2=vertical?x:x+this.len;
    this.y2=vertical?y+this.len:y;
  }
  update(dx) { this.x1-=dx; this.x2-=dx; }
  offscreen() { return this.x2<-100; }
  rect() {
    if(this.vertical) return {x:this.x1-this.thick/2, y:Math.min(this.y1,this.y2), w:this.thick, h:Math.abs(this.y2-this.y1)};
    return {x:Math.min(this.x1,this.x2), y:this.y1-this.thick/2, w:Math.abs(this.x2-this.x1), h:this.thick};
  }
  draw() {
    glowLine(this.x1,this.y1,this.x2,this.y2, P.yellow, this.thick);
    glowCircle(this.x1, this.y1, 8, P.yellow, 0.5);
    glowCircle(this.x2, this.y2, 8, P.yellow, 0.5);
  }
}

// ── Audit Wall ─────────────────────────────────────────────
class AuditWall {
  constructor(x, gapY, gapH) {
    this.x=x; this.w=28; this.gapY=gapY; this.gapH=gapH;
  }
  update(dx) { this.x-=dx; }
  offscreen() { return this.x+this.w<-100; }
  rects() {
    return [
      {x:this.x, y:RAIL, w:this.w, h:Math.max(0,this.gapY-RAIL)},
      {x:this.x, y:this.gapY+this.gapH, w:this.w, h:Math.max(0,H-RAIL-(this.gapY+this.gapH))}
    ];
  }
  draw() {
    // Jacob's filing cabinet style
    const CAB_BODY='#78808a', CAB_FACE='#969da8', CAB_EDGE='#373c46';
    const HANDLE='#464b55', PAPER='#ebeef5', PAPER_EDGE='#b4b9c3';

    for(const r of this.rects()) {
      if(r.w<=6 || r.h<=10) continue;
      // Cabinet outer
      ctx.fillStyle=CAB_BODY; roundRect(r.x,r.y,r.w,r.h,4); ctx.fill();
      ctx.strokeStyle=CAB_EDGE; ctx.lineWidth=2; roundRect(r.x,r.y,r.w,r.h,4); ctx.stroke();

      // Drawers
      const drawerH = Math.max(34, r.w);
      const drawers = Math.max(1, Math.floor(r.h/drawerH));
      const usedH   = drawers*drawerH;
      const y0      = r.y + (r.h-usedH)/2;

      for(let i=0; i<drawers; i++) {
        const dy = y0 + i*drawerH;
        const face = {x:r.x+5, y:dy+5, w:r.w-10, h:drawerH-10};
        if(face.w<=8||face.h<=8) continue;
        ctx.fillStyle=CAB_FACE; roundRect(face.x,face.y,face.w,face.h,3); ctx.fill();
        ctx.strokeStyle=CAB_EDGE; ctx.lineWidth=1; roundRect(face.x,face.y,face.w,face.h,3); ctx.stroke();
        // Handle
        const hW=Math.min(26,face.w-8), hH=5;
        const hx=face.x+face.w/2-hW/2, hy=face.y+face.h-12;
        ctx.fillStyle=HANDLE; roundRect(hx,hy,hW,hH,3); ctx.fill();
      }

      // One open drawer with paper sticking out
      if(drawers>=2 && r.h>=90 && r.w>=50) {
        const openI = Math.floor(r.x/40)%drawers;
        const dy    = y0 + openI*drawerH;
        const face  = {x:r.x+5, y:dy+5, w:r.w-10, h:drawerH-10};
        // Dark slot
        ctx.fillStyle='#23262e';
        roundRect(face.x+6, face.y+8, face.w-12, 10, 3); ctx.fill();
        // Paper
        const pw=Math.min(28, face.w-20);
        ctx.fillStyle=PAPER; roundRect(face.x+face.w/2-pw/2, face.y, pw, 12, 2); ctx.fill();
        ctx.strokeStyle=PAPER_EDGE; ctx.lineWidth=1;
        roundRect(face.x+face.w/2-pw/2, face.y, pw, 12, 2); ctx.stroke();
        // Paper lines
        const px2=face.x+face.w/2-pw/2;
        ctx.strokeStyle=PAPER_EDGE; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(px2+4,face.y+4); ctx.lineTo(px2+pw-4,face.y+4); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px2+4,face.y+7); ctx.lineTo(px2+pw-8,face.y+7); ctx.stroke();
      }
    }
  }
}

// ── Rotator ────────────────────────────────────────────────
class Rotator {
  constructor(x,y) {
    this.x=x; this.y=y;
    this.r=randI(32,46);
    this.angle=Math.random()*TAU;
    this.angV=(Math.random()<0.5?-1:1)*rand(0.016,0.030);
  }
  update(dx) { this.x-=dx; this.angle+=this.angV; }
  offscreen() { return this.x+this.r<-100; }
  arms() {
    const arms=[];
    for(const da of [0, Math.PI/2]) {
      const a=this.angle+da;
      arms.push([this.x+Math.cos(a)*this.r, this.y+Math.sin(a)*this.r,
                 this.x-Math.cos(a)*this.r, this.y-Math.sin(a)*this.r]);
    }
    return arms;
  }
  draw() {
    glowCircle(this.x, this.y, 7, '#a0afc8', 0.3);
    ctx.fillStyle='#a0afc8';
    ctx.beginPath(); ctx.arc(this.x,this.y,8,0,TAU); ctx.fill();
    for(const [ax,ay,bx,by] of this.arms()) glowLine(ax,ay,bx,by,P.red,7);
  }
  collides(rect) {
    const bx=this.x-this.r-4, by=this.y-this.r-4, bw=this.r*2+8, bh=this.r*2+8;
    if(!rectsOverlap({x:bx,y:by,w:bw,h:bh},rect)) return false;
    for(const [ax,ay,bx2,by2] of this.arms()) {
      if(lineHitsRect(ax,ay,bx2,by2,rect)) return true;
    }
    return false;
  }
}

function rectsOverlap(a,b) {
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}
function lineHitsRect(x1,y1,x2,y2,r,steps=12) {
  for(let i=0;i<=steps;i++) {
    const t=i/steps, px=x1+(x2-x1)*t, py=y1+(y2-y1)*t;
    if(px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h) return true;
  }
  return false;
}
function rectHitsRect(a,b) { return rectsOverlap(a,b); }

// ── Pickup ─────────────────────────────────────────────────
const PCOLS  = {funding:P.green, shield:P.cyan, double:P.orange, magnet:P.purple, gun:'#c8cde1'};
const PICONS = {funding:'$', shield:'✦', double:'2X', magnet:'U', gun:'G'};

class Pickup {
  constructor(kind,x,y) {
    this.kind=kind; this.x=x; this.y=y;
    this.r=kind==='funding'?9:12; this.taken=false;
    this.bobT=Math.random()*TAU;
  }
  update(dx,dt) { this.x-=dx; this.bobT+=dt*2.5; }
  offscreen()   { return this.x<-80||this.taken; }
  collides(rect) {
    if(this.taken) return false;
    const dx=rect.x+rect.w/2-this.x, dy=rect.y+rect.h/2-this.y;
    return dx*dx+dy*dy<=(this.r+15)**2;
  }
  draw() {
    if(this.taken) return;
    const by = this.y + Math.sin(this.bobT)*3;
    const col = PCOLS[this.kind];
    glowCircle(this.x, by, this.r+3, col, 0.28);
    ctx.save();
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(this.x, by, this.r, 0, TAU); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#101820'; ctx.font=F(11,true); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(PICONS[this.kind], this.x, by);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
}

// ── Drone ──────────────────────────────────────────────────
class Drone {
  constructor(x,y) { this.x=x; this.y=y; this.r=9; this.state='track'; this.timer=0; }
  update(dx, playerCY, speed) {
    this.x-=dx; this.timer++;
    if(this.state==='track') {
      this.y += this.y<playerCY ? 2.2 : -2.2;
      if(this.timer>85) { this.state='dash'; this.timer=0; }
    } else {
      this.x -= 9+speed;
      this.y += Math.sin(this.timer/5)*1.2;
    }
  }
  offscreen() { return this.x<-130; }
  collides(rect) {
    const dx=rect.x+rect.w/2-this.x, dy=rect.y+rect.h/2-this.y;
    return dx*dx+dy*dy<=(this.r+16)**2;
  }
  draw() {
    // Jacob's detailed gray attack drone
    const x=this.x, y=this.y;
    const BODY='#878c96', BODY_DARK='#555a64', OUTLINE='#2d3238';
    const METAL='#6e737d', LIGHT='#ebf0fa', RED='#ff5555';

    const bodyW=44, bodyH=20;
    const bx=x-bodyW/2, by=y-bodyH/2;

    // Soft neutral glow
    glowCircle(x, y, 16, '#a0a5af', 0.22);

    // Main body
    ctx.fillStyle=BODY; roundRect(bx,by,bodyW,bodyH,10); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=2; roundRect(bx,by,bodyW,bodyH,10); ctx.stroke();

    // Top plate detail
    ctx.fillStyle=METAL; roundRect(bx+6,by+4,bodyW-12,6,6); ctx.fill();

    // Arms
    const armY = y-6;
    ctx.strokeStyle=BODY_DARK; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bx,armY); ctx.lineTo(bx-18,armY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx+bodyW,armY); ctx.lineTo(bx+bodyW+18,armY); ctx.stroke();

    // Rotors
    for(const [rx,ry] of [[bx-24,armY],[bx+bodyW+24,armY]]) {
      ctx.fillStyle=METAL; ctx.beginPath(); ctx.arc(rx,ry,11,0,TAU); ctx.fill();
      ctx.strokeStyle=OUTLINE; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(rx,ry,11,0,TAU); ctx.stroke();
      // propeller cross
      ctx.strokeStyle=LIGHT; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(rx-8,ry); ctx.lineTo(rx+8,ry); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(rx,ry-8); ctx.lineTo(rx,ry+8); ctx.stroke();
      // hub
      ctx.fillStyle=OUTLINE; ctx.beginPath(); ctx.arc(rx,ry,3,0,TAU); ctx.fill();
    }

    // Front camera eye (red = attack drone)
    const ex=x+10, ey=y-1;
    glowCircle(ex, ey, 8, '#ff5a5a', 0.40);
    ctx.fillStyle=OUTLINE; ctx.beginPath(); ctx.arc(ex,ey,7,0,TAU); ctx.fill();
    ctx.fillStyle='#191c22'; ctx.beginPath(); ctx.arc(ex,ey,5,0,TAU); ctx.fill();
    ctx.fillStyle=RED; ctx.beginPath(); ctx.arc(ex,ey,3,0,TAU); ctx.fill();

    // Gun barrel
    ctx.fillStyle=BODY_DARK; roundRect(x+bodyW/2-6,y+5,16,5,2); ctx.fill();
    ctx.strokeStyle=OUTLINE; ctx.lineWidth=2; roundRect(x+bodyW/2-6,y+5,16,5,2); ctx.stroke();

    // Tail fin
    ctx.fillStyle=BODY_DARK;
    ctx.beginPath();
    ctx.moveTo(x-18,y); ctx.lineTo(x-30,y+6); ctx.lineTo(x-18,y+8);
    ctx.closePath(); ctx.fill();
  }
}

// ── Bullet ─────────────────────────────────────────────────
class Bullet {
  constructor(x,y) { this.x=x; this.y=y; this.vx=15; this.r=4; this.alive=true; }
  update(wdx) { this.x+=this.vx-wdx*0.12; }
  offscreen()  { return this.x>W+60||this.x<-60; }
  hits(drone) {
    if(!drone) return false;
    const dx=this.x-drone.x, dy=this.y-drone.y;
    return dx*dx+dy*dy<=(drone.r+this.r+2)**2;
  }
  draw() {
    glowCircle(this.x, this.y, 5, '#fff0d2', 0.4);
    ctx.fillStyle='#fff0d2';
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, TAU); ctx.fill();
  }
}

function drawHearts(x, y, lives) {
  for(let i=0;i<3;i++) {
    const cx=x+i*30, active=i<lives;
    ctx.fillStyle = active ? P.red : '#4b4e5c';
    ctx.beginPath(); ctx.arc(cx+6,  y+8, 6, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+14, y+8, 6, 0, TAU); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx, y+11); ctx.lineTo(cx+10, y+24); ctx.lineTo(cx+20, y+11);
    ctx.closePath(); ctx.fill();
  }
}

function drawStore(savedCash, owned) {
  const items=[
    ['MAGNET+',    120,'Magnet lasts +3s each pickup'],
    ['SHIELD+',    150,'Shield lasts +3s each pickup'],
    ['BOOST+',     180,'Double boost lasts +3s'],
    ['STARTER$',    90,'Start each run with +$20 funding'],
    ['COOL TRAIL', 200,'Cosmetic: neon trail while thrusting'],
  ];

  const BX=145, BY=55, BW=710, BH=490;
  const HEADER_H=160; // height reserved for title/cash/hint above items
  const ITEM_H=76;
  const SCROLL_AREA_H=BH-HEADER_H-16;
  const totalItemsH=items.length*ITEM_H;

  // Clamp scroll so we never show blank space
  const maxScroll=Math.max(0, totalItemsH-SCROLL_AREA_H);
  drawStore._scroll=clamp(drawStore._scroll||0, 0, maxScroll);

  // Dim background
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);

  // Panel
  ctx.fillStyle='rgba(52,56,74,0.97)';
  roundRect(BX,BY,BW,BH,18); ctx.fill();
  ctx.strokeStyle=P.rail; ctx.lineWidth=2;
  roundRect(BX,BY,BW,BH,18); ctx.stroke();
  ctx.restore();

  // Header (unclipped)
  ctx.font=FO(34); ctx.fillStyle=P.white; ctx.textAlign='center';
  ctx.fillText('STORE', W/2, BY+52);
  ctx.font=F(20); ctx.fillStyle=P.green;
  ctx.fillText(`Saved Cash: $${savedCash}`, W/2, BY+92);
  ctx.font=F(15); ctx.fillStyle=P.mid;
  ctx.fillText('Press 1–5 to buy  |  B to close  |  ↑↓ / scroll to browse', W/2, BY+122);

  // Clipped scroll region for items
  const clipX=BX+8, clipY=BY+HEADER_H, clipW=BW-16, clipH=SCROLL_AREA_H;
  ctx.save();
  ctx.beginPath(); ctx.rect(clipX, clipY, clipW, clipH); ctx.clip();

  let sy = clipY - drawStore._scroll;
  items.forEach(([name,cost,desc],i)=>{
    const isOwned=owned.has(name);
    ctx.fillStyle=isOwned?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.03)';
    roundRect(BX+40, sy, BW-80, 68, 8); ctx.fill();
    ctx.font=F(18); ctx.fillStyle=isOwned?'#7080a0':P.white; ctx.textAlign='left';
    ctx.fillText(`${i+1}) ${name}  —  ${isOwned?'OWNED':'$'+cost}`, BX+60, sy+22);
    ctx.font=F(13); ctx.fillStyle='#8090b8';
    ctx.fillText(desc, BX+80, sy+48);
    sy+=ITEM_H;
  });
  ctx.restore();

  // Scrollbar (only if needed)
  if(totalItemsH>SCROLL_AREA_H) {
    const sbX=BX+BW-18, sbY=clipY, sbH=clipH;
    ctx.fillStyle='rgba(255,255,255,0.08)';
    roundRect(sbX,sbY,8,sbH,4); ctx.fill();
    const thumbH=Math.max(30, sbH*(SCROLL_AREA_H/totalItemsH));
    const thumbY=sbY+(drawStore._scroll/maxScroll)*(sbH-thumbH);
    ctx.fillStyle='rgba(255,255,255,0.30)';
    roundRect(sbX,thumbY,8,thumbH,4); ctx.fill();
  }

  ctx.textAlign='left';
}

// GAME STATE
// ═══════════════════════════════════════════════════════════
const STORE_ITEMS=[
  ['MAGNET+',120],['SHIELD+',150],['BOOST+',180],['STARTER$',90],['COOL TRAIL',200]
];

class Game {
  constructor() {
    this.best=0; this.lifetimeDist=0;
    this.savedCash=this._loadCash();
    this.owned=this._loadOwned();

    this.bg=new LabBackground();
    this.player=new Player();
    this.particles=[];
    this.shakeT=0; this.shakeMag=0;

    this.state='title'; // title|playing|paused|store|gameover
    this.titleAlpha=0;
    this.ticks=0;

    this._initRun();
    this._bindInput();
  }

  // ── Persistence ──────────────────────────────────────────
  _loadCash() {
    try { return parseInt(localStorage.getItem('brb_cash')||'0'); } catch{ return 0; }
  }
  _loadOwned() {
    try {
      const s=localStorage.getItem('brb_owned')||'';
      return new Set(s.split(',').filter(x=>x));
    } catch { return new Set(); }
  }
  _save() {
    try {
      localStorage.setItem('brb_cash',    String(this.savedCash));
      localStorage.setItem('brb_owned',   [...this.owned].join(','));
      localStorage.setItem('brb_best',    String(this.best));
      localStorage.setItem('brb_lifetime',String(this.lifetimeDist));
    } catch{}
  }

  has(item) { return this.owned.has(item); }

  // ── Run init ──────────────────────────────────────────────
  _initRun() {
    this.distance=0; this.valuation=0;
    this.funding=this.has('STARTER$')?20:0;
    this.burn=0; this.stage=1; this.speed=3.2;

    this.lasers=[]; this.walls=[]; this.rotators=[];
    this.pickups=[]; this.bullets=[];
    this.drone=null; this.droneT=0;
    this.reason='';
    this.particles=[];

    this.player.reset(this.has('STARTER$'));
    this.lasers.push(this._makeLaser());
  }

  _makeLaser() {
    const vert=Math.random()<0.5;
    const safe=90, off=randI(80,480);
    if(vert) return new Laser(W+off, randI(RAIL+20, H-RAIL-220), vert);
    let y, tries=0;
    do { y=randI(RAIL+20,H-RAIL-20); tries++; } while(Math.abs(y-this.player.y)<safe && tries<12);
    return new Laser(W+off, y, vert);
  }

  _makeWall() {
    const gapH=randI(215,275);
    const center=this.player.y+randI(-50,50);
    const gapY=clamp(center-gapH/2, RAIL+4, H-RAIL-gapH-4);
    return new AuditWall(W+randI(200,500), gapY, gapH);
  }

  _makeRotator() { return new Rotator(W+randI(240,560), randI(RAIL+40,H-RAIL-40)); }

  _spawnPickups() {
    const items=[];
    if(Math.random()<0.78)
      for(let i=0;i<randI(1,3);i++)
        items.push(new Pickup('funding',W+randI(80,460),randI(RAIL+20,H-RAIL-20)));
    for(const [kind,prob] of [['shield',.13],['double',.11],['magnet',.11],['gun',.07]])
      if(Math.random()<prob)
        items.push(new Pickup(kind,W+randI(200,520),randI(RAIL+20,H-RAIL-20)));
    return items;
  }

  _sparks(cx,cy,col=P.yellow,shake=false) {
    if(shake) { this.shakeT=0.20; this.shakeMag=6; }
    for(let i=0;i<16;i++)
      this.particles.push(new Particle(cx,cy,rand(-4.5,4.5),rand(-4.5,4.5),rand(0.25,0.50),col,randI(2,3)));
  }

  _jetParticles() {
    const p=this.player;
    if(!p.boosting) return;
    const r=p.rect;
    for(let i=0;i<3;i++) {
      const col=`hsl(${randI(20,40)},100%,${randI(50,70)}%)`;
      this.particles.push(new Particle(
        r.x-12+rand(-4,2), r.y+r.h/2+12+rand(-6,6),
        rand(-3.2,-1.0), rand(-0.5,0.5),
        rand(0.22,0.42), P.orange, randI(2,4)));
    }
  }

  _bank() {
    this.savedCash    += this.funding;
    this.lifetimeDist += Math.floor(this.distance);
    if(this.distance>this.best) this.best=Math.floor(this.distance);
    this._save();
  }

  _progression() {
    this.stage=1+Math.floor(this.distance/900);
    const base=3.2+(this.distance/5000)*2.2+(this.stage-1)*0.22;
    this.speed=Math.min(9.8,base);
  }

  _checkHazards() {
    const r=this.player.rect;
    for(const l of this.lasers) if(rectHitsRect(r,l.rect())) return 'Compliance laser hit!';
    for(const w of this.walls) for(const wr of w.rects()) if(rectHitsRect(r,wr)) return 'Audit wall blocked you!';
    for(const rot of this.rotators) if(rot.collides(r)) return 'Rotator hit — market turbulence!';
    if(this.drone&&this.drone.collides(r)) return 'Competitor drone took you out.';
    return null;
  }

  // ── Update ────────────────────────────────────────────────
  update(dt) {
    this.ticks++;
    this.bg.update(this.state==='playing'?this.speed:1.5);

    if(this.state==='playing') this._updatePlaying(dt);
    if(this.shakeT>0) { this.shakeT-=dt; }

    for(const p of this.particles) p.update(dt, this.state==='playing'?this.speed:0);
    this.particles=this.particles.filter(p=>p.life>0);
  }

  _updatePlaying(dt) {
    const dx=this.speed;
    this.distance+=dx; this.burn+=0.016*(1+this.stage*0.09);
    this._progression();

    this.player.update(dt);
    this._jetParticles();

    // Magnet
    if(this.player.magnetT>0) {
      for(const pk of this.pickups) if(pk.kind==='funding'&&!pk.taken) {
        const r=this.player.rect;
        pk.x+=(r.x+r.w/2-pk.x)*0.08;
        pk.y+=(r.y+r.h/2-pk.y)*0.08;
      }
    }

    // Spawn
    if(!this.lasers.length||this.lasers[this.lasers.length-1].x2<W-randI(300,520))
      if(Math.random()<Math.min(0.40,0.15+this.stage*0.025))
        this.lasers.push(this._makeLaser());

    const closeWall=this.walls.some(w=>Math.abs(w.x-W)<500);
    if(!closeWall&&(!this.walls.length||this.walls[this.walls.length-1].x<W-randI(520,800)))
      if(Math.random()<Math.min(0.30,0.09+this.stage*0.018))
        this.walls.push(this._makeWall());

    if(!this.rotators.length||this.rotators[this.rotators.length-1].x<W-randI(480,780))
      if(Math.random()<Math.min(0.26,0.07+this.stage*0.018))
        this.rotators.push(this._makeRotator());

    if(Math.random()<0.065) this.pickups.push(...this._spawnPickups());

    this.droneT++;
    if(!this.drone&&this.distance>800&&this.droneT>680-this.stage*25) {
      this.droneT=0;
      this.drone=new Drone(W+40, randI(RAIL+30,H-RAIL-30));
    }

    // Update all
    for(const obj of [...this.lasers,...this.walls,...this.rotators]) obj.update(dx);
    for(const pk of this.pickups) pk.update(dx,dt);
    for(const b of this.bullets) b.update(dx);
    if(this.drone) { this.drone.update(dx,this.player.rect.y+this.player.rect.h/2,this.speed); if(this.drone.offscreen()) this.drone=null; }

    // Cull
    this.lasers   =this.lasers.filter(l=>!l.offscreen());
    this.walls    =this.walls.filter(w=>!w.offscreen());
    this.rotators =this.rotators.filter(r=>!r.offscreen());
    this.pickups  =this.pickups.filter(p=>!p.offscreen());
    this.bullets  =this.bullets.filter(b=>!b.offscreen()&&b.alive);

    // Pickup collisions
    for(const pk of this.pickups) {
      if(!pk.taken&&pk.collides(this.player.rect)) {
        pk.taken=true;
        if(pk.kind==='funding')  { this.funding+=10; }
        else if(pk.kind==='shield')  { this.player.shieldT=6+(this.has('SHIELD+')?3:0); }
        else if(pk.kind==='double')  { this.player.doubleT=6+(this.has('BOOST+')?3:0); }
        else if(pk.kind==='magnet')  { this.player.magnetT=7+(this.has('MAGNET+')?3:0); }
        else if(pk.kind==='gun')     { this.player.gunT=7; }
        this._sparks(pk.x,pk.y,PCOLS[pk.kind], pk.kind==='shield');
      }
    }

    // Bullet vs drone
    if(this.drone) {
      for(const b of this.bullets) if(b.hits(this.drone)) {
        b.alive=false;
        this._sparks(this.drone.x,this.drone.y,P.purple);
        this.funding+=30; this.drone=null; break;
      }
    }

    this.valuation=Math.max(0, this.distance*(1+this.funding/700)-this.burn*7);

    // Hazard collision
    if(this.player.invuln<=0) {
      const msg=this._checkHazards();
      if(msg) {
        this._sparks(this.player.rect.x+this.player.rect.w/2, this.player.rect.y+this.player.rect.h/2);
        if(this.player.shieldT>0) { this.player.shieldT=0; this.player.invuln=0.8; }
        else {
          this.player.lives--;
          if(this.player.lives>0) this.player.respawn();
          else { this.reason=msg; this._bank(); this.state='gameover'; }
        }
      }
    }
  }

  // ── Draw ──────────────────────────────────────────────────
  draw() {
    ctx.clearRect(0,0,W,H);
    this.bg.draw(this.distance, this.ticks);

    if(this.state==='title') {
      drawTitle(this.titleAlpha, this.ticks);
      this.titleAlpha=Math.min(255, this.titleAlpha+7);
      return;
    }

    // Shake
    if(this.shakeT>0) {
      ctx.save();
      ctx.translate(rand(-this.shakeMag,this.shakeMag), rand(-this.shakeMag,this.shakeMag));
    }

    for(const l of this.lasers)   l.draw();
    for(const w of this.walls)    w.draw();
    for(const r of this.rotators) r.draw();
    for(const pk of this.pickups) pk.draw();
    if(this.drone) this.drone.draw();
    for(const b of this.bullets)  b.draw();
    for(const p of this.particles) p.draw();
    this.player.draw(this.ticks, this.has('COOL TRAIL'));

    if(this.shakeT>0) ctx.restore();

    drawHUD({
      distance: this.distance, best: this.best,
      funding: this.funding, savedCash: this.savedCash,
      valuation: this.valuation, burn: this.burn,
      stage: this.stage, player: this.player,
    });

    if(this.state==='paused') {
      drawPanel('PAUSED',[
        ['P — resume  |  R — restart', P.white],
        ['B — store   |  ESC — title', P.mid],
        [`Lifetime: ${this.lifetimeDist} m`, '#7080a0'],
      ]);
    }
    if(this.state==='store') {
      drawStore(this.savedCash, this.owned);
    }
    if(this.state==='gameover') {
      drawPanel('RUN ENDED',[
        [this.reason,  P.red],
        [`Distance: ${Math.floor(this.distance)} m   Best: ${Math.floor(this.best)} m`, P.white],
        [`Saved Cash: $${this.savedCash}`, P.green],
        ['R — restart  |  B — store  |  ESC — title', P.muted],
      ], P.red);
    }
  }

  // ── Input ─────────────────────────────────────────────────
  _bindInput() {
    window.addEventListener('keydown', e => this._onKey(e.key, e));
    window.addEventListener('keyup',   e => { if(e.key===' ') this.player.boosting=false; });
    canvas.addEventListener('mousedown', e => { if(e.button===0) this._onThrust(true);  if(e.button===2&&this._tryShoot()) e.preventDefault(); });
    canvas.addEventListener('mouseup',   e => { if(e.button===0) this._onThrust(false); });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    canvas.addEventListener('wheel', e => {
      if(this.state==='store') { drawStore._scroll=(drawStore._scroll||0)+e.deltaY*0.5; e.preventDefault(); }
    }, {passive:false});

    canvas.addEventListener('touchstart', e => { e.preventDefault(); this._onThrust(true); });
    canvas.addEventListener('touchend',   e => { e.preventDefault(); this._onThrust(false); });
  }

  _onThrust(on) {
    if(this.state==='title' && on) { this.state='playing'; return; }
    if(this.state==='playing') this.player.boosting=on;
    if(this.state==='gameover' && on) { this._initRun(); this.state='playing'; }
  }

  _tryShoot() {
    if(this.state==='playing' && this.player.canShoot()) {
      const r=this.player.rect;
      this.bullets.push(new Bullet(r.x+r.w+10, r.y+r.h/2));
      this.player.shoot();
      return true;
    }
    return false;
  }

  _onKey(key, e) {
    if(key==='Escape') {
      if(this.state==='playing'||this.state==='paused') { this._bank(); this._initRun(); this.state='title'; this.titleAlpha=0; }
      else if(this.state==='store') this.state='playing';
      else if(this.state==='gameover') { this.state='title'; this.titleAlpha=0; }
      return;
    }
    if(this.state==='title') {
      if(key===' '||key==='Enter') { this.state='playing'; e&&e.preventDefault(); }
      return;
    }
    if(this.state==='store') {
      if(key==='b'||key==='B') { this.state='playing'; }
      if(key==='ArrowDown')  { drawStore._scroll=(drawStore._scroll||0)+40; }
      if(key==='ArrowUp')    { drawStore._scroll=Math.max(0,(drawStore._scroll||0)-40); }
      const idx={'1':0,'2':1,'3':2,'4':3,'5':4}[key];
      if(idx!==undefined) this._buy(idx);
      return;
    }
    if(this.state==='gameover') {
      if(key==='r'||key==='R') { this._initRun(); this.state='playing'; }
      if(key==='b'||key==='B') this.state='store';
      return;
    }
    if(this.state==='paused') {
      if(key==='p'||key==='P') this.state='playing';
      if(key==='r'||key==='R') { this._bank(); this._initRun(); this.state='playing'; }
      if(key==='b'||key==='B') this.state='store';
      return;
    }
    // Playing
    if(key===' ')           { this.player.boosting=true; e&&e.preventDefault(); }
    if(key==='p'||key==='P') this.state='paused';
    if(key==='b'||key==='B') { this.state='store'; drawStore._scroll=0; }
    if(key==='r'||key==='R') { this._bank(); this._initRun(); }
    if(key==='f'||key==='F') this._tryShoot();
  }

  _buy(idx) {
    if(idx<0||idx>=STORE_ITEMS.length) return;
    const [name,cost]=STORE_ITEMS[idx];
    if(this.owned.has(name)) return;
    if(this.savedCash>=cost) { this.savedCash-=cost; this.owned.add(name); this._save(); }
  }
}

// ═══════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════
const game = new Game();
let last = 0;

function loop(ts) {
  const dt = Math.min((ts-last)/1000, 0.05);
  last = ts;
  game.update(dt);
  game.draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last=ts; requestAnimationFrame(loop); });
</script>
</body>
